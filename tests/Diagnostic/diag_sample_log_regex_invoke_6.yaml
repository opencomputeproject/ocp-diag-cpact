test_scenario:
  test_id: DG_6S
  test_name: DiagSampleLogRegexInvoke6
  test_description: |
                    Sample Diagnostic recipe to search for a regex string with
                    multiple assignment and create a DRC with the assignment as associated fields.
                    (Combination of DRCs and associated fields are unique)
  test_group: Diag
  schema_version: '0.8'
  map_file: '{workspace_path}/map_file1.json'
  tags: [Diag, Sample]
  paths:
    workspace_path: ./sample_workspace
    scenario_path: ./tests

  test_steps:
  - step_id: step_001
    step_name: SearchForRegexAssignDRCWithFieldsLogAnalysis
    step_description: Search for a regex string in log and assign a DRC with associated fields.
    connection_type: Local
    connection: local
    step_type: log_analysis
    log_analysis_path: '{workspace_path}/test_run.log'
    validator_type: regex
    diagnostic_analysis:
    - search_string: (?P<Error_Code>ERR-(?=\d*[1-9])\d+)\s*\|\s*[^\|]*\s*\|\s*[^\|]*\s*\|\s*[^\|]*\s*\|\s*(?P<Component_ID>[^\|]+)
      diagnostic_result_code: Error_Code
      parameter_to_set: error_code

    - search_string: (?P<Error_Code>FAIL-(?=\d*[1-9])\d+)\s*\|.*?\|.*?\|.*?\|(?P<Component_ID>[^\|]+)\|\s*(?P<Notes>.*?)(?=(\nFAIL-|$))
      diagnostic_result_code: Error_Code
      parameter_to_set: error_code

  - step_id: step_002
    step_name: SearchForRegexAssignDRCWithFieldsInvoke
    step_description: Search for a regex string in log and assign a DRC with associated fields.
    connection_type: Local
    connection: local
    step_type: invoke_scenario
    scenario_path: '{scenario_path}/Diagnostic/diag_sample_log_regex_nested_7.yaml'

# Note:- Combination of DRCs and associated fields are unique.
#        e.g. if the search string is found 3 times in the log with different